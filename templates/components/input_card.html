<div class="form-container">
  <div class="panel-heading">
    <h3>Image Upload</h3>
  </div>

  <section class="mode-panel is-active" data-mode-panel="upload">
    <div class="status-info">
      <p><strong>Status:</strong> Waiting for image</p>
      <p><strong>Model:</strong> Traffic Sign Detect v1</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="upload-form" action="{{ url_for('app_page') }}">
      <label class="upload-box drop-zone" id="drop-zone" for="image">
        <span class="drop-zone-icon">📁</span>
        <span class="upload-title">Drag & Drop image here</span>
        <span class="drop-zone-hint">or click to browse files</span>
        <input id="image" type="file" name="image" accept="image/*" capture="environment" />
      </label>
      <button type="submit" class="submit-button btn-orange">UPLOAD NEW IMAGE</button>
    </form>

    {% if error_message %}
    <div class="message error">{{ error_message }}</div>
    {% endif %}
  </section>

  <section class="mode-panel" data-mode-panel="webcam" hidden>
    <div class="status-info">
      <p><strong>Status:</strong> Webcam mode ready</p>
    </div>
    
    <div class="camera-stage live-camera-stage" style="margin-bottom: 16px;">
      <video id="camera-stream" playsinline muted></video>
      <canvas id="camera-canvas" hidden></canvas>
      <div class="camera-placeholder" id="camera-placeholder">
        <p>Live feed preview</p>
      </div>
    </div>

    <div class="camera-actions">
      <button type="button" class="submit-button btn-orange" id="start-camera">
        START WEBCAM
      </button>
      <button type="button" class="ghost-button btn-outline" id="stop-camera" disabled>
        STOP WEBCAM
      </button>
    </div>
    <div class="camera-hints">
      <p id="camera-status">Webcam idle.</p>
    </div>
  </section>
</div>
