<!DOCTYPE html>
<html lang="en">
  <head>
    {% include 'components/head.html' %}
  </head>
  <body class="dashboard-layout no-sidebar">
    <main class="dashboard-main light-bg">
      <header class="main-header">
        <div class="header-left">
          <a href="{{ url_for('index') }}" class="back-link">&larr; Accueil</a>
        </div>
        <div class="header-center" role="tablist" aria-label="Prediction mode">
          <button type="button" class="tab-button mode-button is-active" data-mode-target="upload" aria-pressed="true">
            Image Upload
          </button>
          <button type="button" class="tab-button mode-button" data-mode-target="webcam" aria-pressed="false">
            Webcam Live
          </button>
        </div>
        <div class="header-right">
          <span class="status-badge"><span class="status-dot"></span> Model Online</span>
        </div>
      </header>
      
      <div class="main-content">
        <h1 class="page-title">IMAGE ANALYSIS</h1>
        <section class="analysis-grid">
          <!-- Column 1: Controls -->
          <div class="grid-col controls-col card-white">
            {% include 'components/input_card.html' %}
          </div>
          
          <!-- Column 2 & 3: Results -->
          {% include 'components/result_card.html' %}
        </section>
      </div>
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
